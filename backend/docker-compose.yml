# ─────────────────────────────────────────────────────────────────────────────
# NewGen Platform – local development infrastructure
# ─────────────────────────────────────────────────────────────────────────────
# Start:  docker compose up -d
# Stop:   docker compose down
# Reset:  docker compose down -v   (drops all volumes / data)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: newgen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-newgen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-newgen_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-newgen}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-newgen} -d $${POSTGRES_DB:-newgen}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Go Backend API ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newgen_backend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT:         ${PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-newgen}:${POSTGRES_PASSWORD:-newgen_secret}@postgres:5432/${POSTGRES_DB:-newgen}?sslmode=disable
      JWT_SECRET:   ${JWT_SECRET:-change-me-in-production-super-secret-key}
      JWT_TTL_HOURS: ${JWT_TTL_HOURS:-24}
      CORS_ORIGIN:  ${CORS_ORIGIN:-http://localhost:5173}
      API_KEY_ARCELIK: ${API_KEY_ARCELIK:-test-api-key-arcelik-001}
      API_KEY_BEKO:    ${API_KEY_BEKO:-test-api-key-beko-002}
    depends_on:
      postgres:
        condition: service_healthy

  # ── pgAdmin 4 ─────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: newgen_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@newgen.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
